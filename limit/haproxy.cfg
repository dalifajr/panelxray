#CONFIGURASI FIGHTERTUNNEL LOADBALANCER [ xxx ]
global
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 1d

    tune.h2.initial-window-size 2147483647
    tune.ssl.default-dh-param 2048

    pidfile /run/haproxy.pid
    chroot /var/lib/haproxy

    user haproxy
    group haproxy
    daemon

    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
    ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
    ssl-default-bind-options no-sslv3 no-tlsv10 no-tlsv11

    ca-base /etc/ssl/certs
    crt-base /etc/ssl/private

defaults
    log global
    mode tcp
    option dontlognull
    timeout connect 60s
    timeout client 300s
    timeout server 300s

frontend multiport
    mode tcp
    bind *:222-442 tfo
    bind *:444-1000 tfo
    tcp-request inspect-delay 500ms
    tcp-request content accept if HTTP
    tcp-request content accept if { req.ssl_hello_type 1 }
    use_backend recir_http if HTTP
    default_backend recir_https

frontend multiports
    mode tcp
    bind abns@haproxy-http accept-proxy tfo
    default_backend recir_https_www

frontend ssl
    mode http
    bind 0.0.0.0:443 ssl crt /etc/haproxy/hap.pem crt /etc/haproxy/certs/ alpn h2,http/1.1 tfo
    bind *:55 tfo
    bind *:8080 tfo
    bind *:8880 tfo
    bind *:2095 tfo
    bind *:2082 tfo
    bind *:2086 tfo
    bind abns@haproxy-https accept-proxy ssl crt /etc/haproxy/hap.pem crt /etc/haproxy/certs/ alpn h2,http/1.1 tfo

    option httplog
    option accept-invalid-http-request

    acl chk_ws hdr(Upgrade) -i websocket
    acl chk_conn hdr_sub(Connection) -i upgrade
    acl is_grpc_alpn ssl_fc_alpn -i h2
    acl is_grpc_path path_beg -i /vless-grpc /vmess-grpc /trojan-grpc /ss-grpc
    acl is_ws_path path_beg -i /vless /vmess /trojan-ws /ss-ws /fightertunnelssh /ssh-ws
    acl is_ovpn_ws path_beg -i /fightertunnelovpn

    use_backend GRUP_FTVPN if is_grpc_alpn is_grpc_path
    use_backend CHANNEL_FTVPN if is_ovpn_ws
    use_backend FTVPN if chk_ws chk_conn
    use_backend FTVPN if is_ws_path
    default_backend FTVPN

frontend ws80_tcp
    mode tcp
    bind *:80 tfo
    default_backend FTVPN_TCP

backend recir_https_www
    mode tcp
    server misssv-bau 127.0.0.1:2223 check

backend FTVPN
    mode http
    server hencet-bau 127.0.0.1:1010 send-proxy check

backend FTVPN_TCP
    mode tcp
    server hencet-bau-tcp 127.0.0.1:1010 send-proxy check

backend SSH_WS_RAW
    mode tcp
    server ws-raw 127.0.0.1:10015 check

backend GRUP_FTVPN
    mode http
    server hencet-baus 127.0.0.1:1013 send-proxy check

backend CHANNEL_FTVPN
    mode http
    server memek-bau 127.0.0.1:1012 send-proxy check

backend recir_http
    mode tcp
    server loopback-for-http abns@haproxy-http send-proxy-v2 check

backend recir_https
    mode tcp
    server loopback-for-https abns@haproxy-https send-proxy-v2 check
