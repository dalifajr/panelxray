global
	log /dev/log local0
	log /dev/log local1 notice
	chroot /var/lib/haproxy
	stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
	stats timeout 1d
	user haproxy
	group haproxy
	daemon
	tune.ssl.default-dh-param 2048
	ssl-default-bind-options no-sslv3 no-tlsv10 no-tlsv11
	ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256
	ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384

defaults
	log global
	mode tcp
	option dontlognull
	timeout connect 30s
	timeout client 300s
	timeout server 300s

frontend http_frontend
	mode tcp
	bind *:80 tfo
	bind *:8080 tfo
	bind *:8880 tfo
	bind *:2082 tfo
	default_backend ws_bridge

frontend https_frontend
	mode tcp
	bind *:443 ssl crt /etc/haproxy/hap.pem alpn h2,http/1.1 tfo
	bind *:8443 ssl crt /etc/haproxy/hap.pem alpn h2,http/1.1 tfo
	bind *:2096 ssl crt /etc/haproxy/hap.pem alpn h2,http/1.1 tfo
	bind *:2087 ssl crt /etc/haproxy/hap.pem alpn h2,http/1.1 tfo
	acl is_grpc ssl_fc_alpn -i h2
	use_backend grpc_bridge if is_grpc
	default_backend ws_bridge

frontend ssh_frontend
	mode tcp
	bind *:143 tfo
	bind *:109 tfo
	default_backend dropbear_backend

backend dropbear_backend
	mode tcp
	server dropbear_server 127.0.0.1:143 check

backend ws_bridge
	mode tcp
	server nginx_ws 127.0.0.1:1010 send-proxy check

backend grpc_bridge
	mode tcp
	server nginx_grpc 127.0.0.1:1013 send-proxy check
