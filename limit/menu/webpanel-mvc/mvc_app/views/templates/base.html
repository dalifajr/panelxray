<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VPNXRay Control Panel</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css', v=asset_version) }}">
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <p class="eyebrow">VPNXRay</p>
      <h1>Control Panel</h1>
      <p class="subtitle">
        {% if active_service %}
        {{ active_service.label }} workspace - CRUD via legacy adapter
        {% else %}
        Dashboard dan mutasi akun via adapter CLI
        {% endif %}
      </p>
    </div>
    <nav class="topbar-right">
      {% if session.get('authenticated') %}
      <a href="{{ url_for('dashboard.dashboard') }}">Dashboard</a>
      <a href="{{ url_for('auth.logout') }}">Logout</a>
      {% endif %}
    </nav>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
